<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Confirmed — Boges2Birds</title>
  <meta name="description" content="Your Boges2Birds email address is confirmed. Open the app to sign in.">
  <link rel="icon" type="image/png" href="icon.png?v=3">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #FFFFFF;
      color: #1A1A1A;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .container {
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    .icon {
      width: 120px;
      height: 120px;
      border-radius: 24px;
      margin-bottom: 24px;
    }

    .checkmark {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #2E7D32;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .checkmark svg {
      width: 32px;
      height: 32px;
      stroke: #FFFFFF;
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .tagline {
      font-size: 1.15rem;
      color: #4A4A4A;
      margin-bottom: 32px;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: #2E7D32;
      border-radius: 2px;
      margin: 0 auto 24px;
    }

    .description {
      color: #888888;
      font-size: 0.95rem;
      line-height: 1.6;
      max-width: 400px;
      margin: 0 auto 32px;
    }

    .home-link {
      display: inline-block;
      color: #2E7D32;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .home-link:hover {
      text-decoration: underline;
    }

    @media (min-width: 600px) {
      h1 {
        font-size: 2.4rem;
      }

      .tagline {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="icon.png?v=3" alt="Boges2Birds app icon" class="icon">

    <div class="checkmark" aria-hidden="true">
      <svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"></polyline></svg>
    </div>

    <h1>Email confirmed</h1>
    <p class="tagline">You're all set — open the Boges2Birds app and sign in.</p>

    <div class="divider"></div>
    <p class="description">
      If the app didn't open automatically, head back to your phone and tap Sign In with the email and password you just registered.
    </p>

    <a class="home-link" href="/">← Back to boges2birds.com</a>
  </div>
</body>
</html>
